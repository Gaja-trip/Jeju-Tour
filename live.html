<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>교통편 | 제주 자전거 투어</title>
  <meta name="description" content="배편, 기차편, 버스편을 실시간 확인하고 전체계획표에 반영">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="index.html"><span class="brand-mark" aria-hidden="true"></span> 제주 자전거 투어</a>
      <nav class="nav-links" aria-label="주요 페이지">
        <a href="course.html">코스</a>
        <a href="restaurants.html">맛집</a>
        <a href="schedule.html">일정표</a>
        <a class="active" href="live.html">교통편</a>
        <a href="transport.html">계획표</a>
      </nav>
    </div>
  </header>

  <nav class="mobile-section-nav" aria-label="모바일 주요 페이지">
    <div class="wrap">
      <a href="course.html">코스</a>
      <a href="restaurants.html">맛집</a>
      <a href="schedule.html">일정표</a>
      <a class="active" href="live.html">교통편</a>
      <a href="transport.html">계획표</a>
    </div>
  </nav>

  <main>
    <section class="hero compact">
      <div class="wrap hero-inner">
        <div>
          <p class="eyebrow">Step 3</p>
          <h1>교통편 실시간 확인 후 확정</h1>
          <p class="hero-copy">배편, 기차편, 버스편 공식 링크를 확인한 뒤 교통편을 선택하면 전체계획표에 자동 반영됩니다.</p>
        </div>
      </div>
    </section>

    <section>
      <div class="wrap">
        <div class="date-panel">
          <label for="tripDate"><strong>출발일</strong></label>
          <input id="tripDate" type="date">
          <span id="dateHint">출발일을 선택하면 브라우저에 저장됩니다.</span>
        </div>

        <div class="section-title">
          <div>
            <p class="kicker">Realtime Links</p>
            <h2>교통편 선택</h2>
          </div>
          <p class="lead">각 카드 안의 공식 링크에서 시간과 잔여석을 확인한 뒤, 사용할 교통편을 확정하세요.</p>
        </div>

        <div data-ferry-search></div>

        <div class="transport-pick-grid" data-transport-picker></div>

        <article class="transport-detail-card selected-transport-card" data-selected-transport></article>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrap">
      <strong>교통편 페이지</strong>
      <p>실제 운항, 잔여석, 차량 및 자전거 선적 가능 여부는 출발일 기준 공식 사이트에서 최종 확인하세요.</p>
    </div>
  </footer>

  <div class="toast" data-toast role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
