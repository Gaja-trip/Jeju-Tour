  <header class="site-header">

      <a class="brand" href="index.html"><span class="brand-mark">J</span> Jeju Bike Planner</a>

      </nav>
    </div>
  </header>

  <nav class="mobile-section-nav" aria-label="모바일 주요 페이지">

      <a href="course.html">코스</a>
      <a href="restaurants.html">맛집</a>

  </nav>

  <main>
    <section class="hero compact">
      <div class="wrap hero-inner">
        <div>
          <p class="eyebrow">Step 2</p>
          <h1>코스 선택값 연동 일정표</h1>

        </div>
      </div>
    </section>

    <section>
      <div class="wrap">

          <div>

          </div>

        </div>

        <div class="segmented-control" data-linked-schedule-tabs aria-label="일정 선택"></div>
        <div class="schedule-summary" data-linked-schedule-summary></div>
        <div class="days" data-linked-schedule-cards></div>

        <div class="action-list linked-actions">
          <a class="btn dark small" href="course.html">코스 다시 선택</a>
          <a class="btn light small" href="live.html">교통편 확인으로 이동</a>

    <div class="wrap">
      <strong>일정표 페이지</strong>
      <p>기상, 피로도, 배편 마감 시간에 따라 거리와 도착 시간을 조정하세요.</p>
