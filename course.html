<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>지도 코스 선택 | 제주 자전거 여행</title>
  <meta name="description" content="V-World 지도 기반 제주 자전거 여행 1~4일차 코스 자동 생성">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="route-map-page">
  <main class="route-map-shell" data-vworld-route-editor>
    <div id="vworldMap" class="vworld-map" aria-label="V-World 지도"></div>

    <aside class="route-map-panel">
      <div class="route-panel-top">
        <a class="brand" href="index.html"><span class="brand-mark">J</span> Jeju Bike Planner</a>
        <div class="panel-nav">
          <a href="schedule.html">일정표</a>
          <a href="live.html">교통편</a>
          <a href="transport.html">계획표</a>
        </div>
      </div>

      <div class="route-panel-heading">
        <p class="kicker">V-World Route Editor</p>
        <h1>지도에서 코스 선택</h1>
        <p>1~4일차를 고른 뒤 출발지와 도착지를 지도에서 클릭하면 제주 해안 자전거 루프 기준으로 코스가 자동 생성됩니다.</p>
      </div>

      <div class="segmented-control route-map-days" data-map-day-tabs></div>

      <div class="map-tool-row">
        <button class="btn dark small" type="button" data-map-mode="start">출발 선택</button>
        <button class="btn light small" type="button" data-map-mode="end">도착 선택</button>
        <button class="btn light small" type="button" data-map-clear>초기화</button>
      </div>

      <div class="route-status" data-map-status>출발 선택 버튼을 누르고 지도에서 출발지를 클릭하세요.</div>

      <article class="route-result-card" data-map-result>
        <span class="tag">대기</span>
        <h2>코스를 선택하세요</h2>
        <p>출발지와 도착지를 선택하면 거리, 예상 고도, 세부 경유지가 표시됩니다.</p>
      </article>

      <div class="map-tool-row route-save-row">
        <button class="btn dark small" type="button" data-map-save disabled>이 코스를 일자에 저장</button>
        <a class="btn light small" href="schedule.html">일정표 보기</a>
      </div>
    </aside>
  </main>

  <div class="toast" data-toast role="status" aria-live="polite"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
