<!doctype html>
<html lang="ko" class="route-map-document">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>제주 자전거 투어</title>
  <meta name="description" content="V-World 지도 기반 제주 자전거 여행 1~4일차 코스 자동 생성">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="route-map-page">
  <main class="route-map-shell" data-vworld-route-editor>
    <div id="vworldMap" class="vworld-map" aria-label="V-World 지도"></div>

    <aside class="route-map-panel" data-route-panel>
      <button class="route-panel-edge-toggle" type="button" data-panel-edge-toggle aria-label="패널 숨기기"></button>
      <div class="route-panel-top" data-panel-toggle-area>
        <a class="brand compact-brand" href="index.html"><span class="brand-mark" aria-hidden="true"></span> 제주 자전거 투어</a>
        <div class="panel-nav">
          <button type="button" data-panel-view-tab="course">코스</button>
          <button type="button" data-panel-view-tab="restaurants">맛집</button>
          <button type="button" data-panel-view-tab="schedule">일정표</button>
          <button type="button" data-panel-view-tab="transport">교통편</button>
          <button type="button" data-panel-view-tab="plan">계획표</button>
        </div>
      </div>

      <div class="panel-view" data-panel-view="course">
        <div class="route-panel-heading">
          <p class="kicker">Course Editor</p>
          <h1>제주 환상 자전거길</h1>
          <p>출발지와 도착지를 선택하거나 장소·주소를 입력하면 해당 구간이 자동 생성됩니다.</p>
        </div>

        <div class="segmented-control route-map-days" data-map-day-tabs></div>

        <div class="map-tool-row">
          <button class="btn dark small" type="button" data-map-mode="start">출발 선택</button>
          <button class="btn light small" type="button" data-map-mode="end">도착 선택</button>
          <button class="btn light small" type="button" data-map-clear>초기화</button>
        </div>

        <div class="map-search-row">
          <input type="search" list="jejuPlaceList" data-place-search placeholder="장소·주소 입력 예: 협재, 성산일출봉, 제주항">
          <datalist id="jejuPlaceList" data-place-list></datalist>
          <button class="btn dark small" type="button" data-place-apply="start">출발 적용</button>
          <button class="btn light small" type="button" data-place-apply="end">도착 적용</button>
        </div>

        <div class="map-tool-row route-save-row">
          <button class="btn dark small" type="button" data-map-save disabled>이 코스를 일자에 저장</button>
          <button class="btn light small" type="button" data-panel-view-tab="schedule">일정표 보기</button>
        </div>

        <div class="route-status" data-map-status>출발 선택 버튼을 누르고 지도나 장소 마커에서 출발지를 선택하세요.</div>

        <article class="route-result-card" data-map-result>
          <span class="tag">대기</span>
          <h2>코스를 선택하세요</h2>
          <p>출발지와 도착지를 선택하면 거리, 예상 고도, 세부 경유지가 표시됩니다.</p>
        </article>

        <a class="riding-star-link" href="https://riding-star.vercel.app/" target="_blank" rel="noreferrer">
          <span class="riding-star-mark" aria-hidden="true">RS</span>
          <span class="riding-star-copy">
            <strong>Riding Star</strong>
            <small>라이딩스타 홈페이지로 이동</small>
          </span>
          <span class="riding-star-pill" aria-hidden="true">바로가기</span>
        </a>

      </div>

      <div class="panel-view" data-panel-view="restaurants" hidden>
        <div class="route-panel-heading compact">
          <p class="kicker">Food List</p>
          <h1>맛집 50선</h1>
        </div>
        <div class="overlay-scroll restaurant-panel-scroll" data-overlay-restaurants></div>
      </div>

      <div class="panel-view" data-panel-view="schedule" hidden>
        <div class="route-panel-heading compact">
          <p class="kicker">Linked Schedule</p>
          <div class="panel-heading-row">
            <h1>일정표</h1>
            <button class="btn light small" type="button" data-reset-schedule>기본 일정 복구</button>
          </div>
        </div>
        <div class="segmented-control route-map-days" data-overlay-schedule-tabs></div>
        <div class="overlay-scroll" data-overlay-schedule></div>
      </div>

      <div class="panel-view" data-panel-view="transport" hidden>
        <div class="route-panel-heading compact">
          <p class="kicker">Live Transport</p>
          <h1>교통편</h1>
        </div>
        <div class="overlay-scroll" data-overlay-transport></div>
      </div>

      <div class="panel-view" data-panel-view="plan" hidden>
        <div class="route-panel-heading compact">
          <p class="kicker">Master Plan</p>
          <div class="panel-heading-row">
            <h1>전체 계획표</h1>
            <button class="btn dark small" type="button" data-export-pdf>PDF 내보내기</button>
          </div>
        </div>
        <div class="overlay-scroll" data-overlay-plan></div>
      </div>
    </aside>
  </main>

  <div class="toast" data-toast role="status" aria-live="polite"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="gpx-route.js"></script>
  <script src="app.js"></script>
</body>
</html>
